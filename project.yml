name: VoxNote
options:
  bundleIdPrefix: com.voxnote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    OTHER_SWIFT_FLAGS:
      - -enable-upcoming-feature
      - NonescapableTypes
      - -enable-experimental-feature
      - NonescapableTypes

packages:
  ZeticMLange:
    url: https://github.com/zetic-ai/ZeticMLangeiOS.git
    exactVersion: "1.5.8"

targets:
  VoxNote:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Views
    resources:
      - path: Resources
    dependencies:
      - package: ZeticMLange
      - framework: Accelerate.framework
      - framework: CoreML.framework
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.voxnote.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S48C9F3F58
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
